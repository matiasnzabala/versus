name: Actualizar precios

on:
  schedule:
    - cron: "0 9 * * *" # todos los días a las 06:00 ARG (09:00 UTC)
  workflow_dispatch:
    inputs:
      test_email:
        description: "Mandar un email de prueba (no scrapea nada real)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - if: ${{ inputs.test_email }}
        run: node scraper/test-email.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

      - if: ${{ !inputs.test_email }}
        run: npm run scrape
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json data/price-log.json data/price-history.json
          git diff --staged --quiet || git commit -m "Actualización automática de precios"
          git push
