name: Actualizar precios

on:
  schedule:
    - cron: "0 9 * * *" # todos los días a las 06:00 ARG (09:00 UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run scrape

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json data/price-log.json
          git diff --staged --quiet || git commit -m "Actualización automática de precios"
          git push
